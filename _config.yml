    twitter:
    facebook:
    weibo:
    zhihu:
    wiki: 
    stackoverflow:
atom_path: /atom.xml
rss_path: /rss.xml
donate_url:

# Comment
comments:
  # 多说评论系统已停止服务，已替换为 Gitalk
  # 基于 GitHub Issues 的现代化评论系统
  gitalk:
    clientID: "Ov23lirVZ1tFTUkf7WLv"
    clientSecret: "96e7ffb3de4f2ed6174c99d0029e31bbd1a89167"
    repo: "mioopoi.github.io"
    owner: "mioopoi"
    admin: ["mioopoi"]
    distractionFreeMode: false
    
  disqus:
    # In my architecture, duoshuo has higher priority then disqus,
    # because duoshuo is quicker then disqus in China.
    # if not only use in China, disqus is better.
    # disqus.name will be actived if duoshuo's name is null(Just delete it).
    # 已停止使用 Disqus，转向 Gitalk
    name: 
    rcomments:
        # Number of comments to show
        num: 8
        # Hide moderators' comments (1 for hidden, 0 for disabled)
        hide_mods: 0
        # Hide display images (1 for hidden, 0 to shown)
        hide_avatars: 1
        # Avatar size in pixels (32 by default)
        avatar_size: 32
        # Character-length of the excerpt (1000 by default)
        excerpt_length: 20
analytics:
    cnzz:
        uid: 1257690589

# Outputting
permalink: /:categories/:title
paginate_path: /page:num/
paginate: 100
timezone: Asia/Shanghai

# Handling Reading
safe:         false
include:      []
exclude:      [".rvmrc", ".rbenv-version", "README.md", "Rakefile", "changelog.md"]
keep_files:   []
encoding:     "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
textile_ext:  "textile"

# Filtering Content
show_drafts: null
limit_posts: 0
future:      true
unpublished: false

# Plugins
plugins: [jekyll-paginate, jekyll-feed, jekyll-seo-tag, jekyll-sitemap, jekyll-remote-theme]
whitelist: []
gems:      []

# Conversion
markdown:    kramdown  # 升级到 kramdown - GitHub Pages 推荐，支持 MathJax
highlighter: rouge   # 保持 rouge 代码高亮
lsi:         false
excerpt_separator: "\n\n"

# Backwards-compatibility
relative_permalinks: false

# Markdown Processors
kramdown:
  auto_ids: true
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge