{% if site.data.blogroll %}
<section class="mb-4">
<h4>Blogroll</h4>
<ul class="list-unstyled">
  {% for list in site.data.blogroll %}
  <li class="mb-1"><a href="{{ list.url }}" title="{{ list.title }}" class="text-decoration-none">{{ list.title }}</a></li>
  {% endfor %}
</ul>
</section>
{% endif %}
