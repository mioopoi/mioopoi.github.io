<footer class="footer text-center py-4">
  <div class="container">
    <div class="row">
      <div class="col">
        <p class="copyright-text mb-1">
          &copy; 2015-{{ site.time | date: '%Y' }} <a href="/" target="_blank" title="{{ site.description }}">{{ site.author.name }}</a> 
          <span class="mx-1">·</span> 
          <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh" target="_blank" rel="noopener noreferrer">CC BY-NC-SA 4.0</a>
        </p>
        <p class="theme-info mb-0 text-muted">
          <a href="https://github.com/javachen/javachen-blog-theme" target="_blank" title="https://github.com/javachen/javachen-blog-theme" rel="noopener noreferrer">Theme</a> built with 
          <a href="https://jekyllrb.com/" target="_blank" title="Transform your plain text into websites and blogs" rel="noopener noreferrer">Jekyll</a>
        </p>
        {% include analytics.html %}
      </div>
    </div>
    <div id="toTop" class="mt-3">
      <a href="#" class="mx-1" title="回到顶部">▲</a>
      <a href="#footer" class="mx-1" title="到底部">▼</a>
    </div>
  </div>
</footer>

<script type="text/javascript" src="{{ ASSET_PATH }}/assets/js/toc.js"></script>



<script type="text/javascript">
$(document).ready(function() {
    $('#toc').toc({ 
        listType: 'ul', 
        showSpeed: 0, 
        showEffect: 'slideDown',
        minimumHeaders: 1 // 降低所需标题数量，确保目录显示
    });
});
</script>


{% if site.comments.duoshuo.name %}
  <!-- 多说公共JS代码 -->
    <script type="text/javascript">
      var duoshuoQuery = {short_name:"{{ site.comments.duoshuo.name }}"};
      (function() {
        var ds = document.createElement('script');
        ds.type = 'text/javascript';ds.async = true;
        ds.src = (document.location.protocol == 'https:' ? 'https:' : 'http:') + '//static.duoshuo.com/embed.js';
        ds.charset = 'UTF-8';
        (document.getElementsByTagName('head')[0] ||
        document.getElementsByTagName('body')[0]).appendChild(ds);
        })();
    </script>
  <!-- 多说公共JS代码 -->
{% else %}
  {% if site.comments.disqus.name %}
    <script type="text/javascript">
    /* * * CONFIGURATION VARIABLES: EDIT BEFORE PASTING INTO YOUR WEBPAGE * * */
      var disqus_shortname = "{{site.comments.disqus.name}}"; // required: replace example with your forum shortname

    /* * * DON'T EDIT BELOW THIS LINE * * */
      (function() {
          var dsq = document.createElement('script'); dsq.type = 'text/javascript'; dsq.async = true;
          dsq.src = 'http://' + disqus_shortname + '.disqus.com/embed.js';
          (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(dsq);
      })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="http://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  {% endif %}
{% endif %}
