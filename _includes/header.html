<header class="header mb-3">
  <div class="row align-items-center">
    <!-- 标题 -->
    <div class="col-md-auto">
      <h1 class="site-title mb-0">
        <a href="/" title="{{ site.title }}">{{ site.title }}</a>
      </h1>
    </div>

    <!-- 导航栏 -->
    <div class="col-md">
      <nav class="navbar navbar-expand-lg navbar-light bg-transparent p-0">
        <div class="container-fluid p-0">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-start" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/archive.html' }}" title="Archive"><svg class="icon"><use xlink:href="#icon-archive"></use></svg> <span class="d-md-none ms-1">Archive</span></a>
              </li>
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/categories.html' }}" title="Categories"><svg class="icon"><use xlink:href="#icon-navicon"></use></svg> <span class="d-md-none ms-1">Categories</span></a>
              </li>
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/tags.html' }}" title="Tags"><svg class="icon"><use xlink:href="#icon-tags"></use></svg> <span class="d-md-none ms-1">Tags</span></a>
              </li>
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/about.html' }}" title="About"><svg class="icon"><use xlink:href="#icon-user"></use></svg> <span class="d-md-none ms-1">About</span></a>
              </li>
              {% if site.author.github %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="https://github.com/{{ site.author.github }}" target="_blank" title="Github"><svg class="icon"><use xlink:href="#icon-github"></use></svg></a>
              </li>
              {% endif %}
              {% if site.author.weibo %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="http://weibo.com/{{ site.author.weibo }}" target="_blank" title="Weibo"><svg class="icon"><use xlink:href="#icon-weibo"></use></svg></a>
              </li>
              {% endif %}
              {% if site.author.stackoverflow %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ site.author.stackoverflow }}" target="_blank" title="Stackoverflow"><svg class="icon"><use xlink:href="#icon-stackoverflow"></use></svg></a>
              </li>
              {% endif %}
              {% if site.author.zhihu %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ site.author.zhihu }}" target="_blank" title="Zhihu"><svg class="icon"><use xlink:href="#icon-zhihu"></use></svg></a>
              </li>
              {% endif %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/rss.xml' }}" target="_blank" title="RSS"><svg class="icon"><use xlink:href="#icon-rss"></use></svg></a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <!-- 搜索框和主题切换 -->
    <div class="col-md-auto d-flex align-items-center">
      <form id="search-form" class="d-flex me-2" role="search" style="width: 140px;">
        <input type="text" class="form-control form-control-sm" placeholder="Search" id="query" aria-label="Search">
      </form>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <svg class="icon"><use xlink:href="#icon-moon"></use></svg>
      </button>
    </div>
  </div>
</header>
