<header class="header mb-3">
  <div class="row align-items-center">
    <!-- 标题 -->
    <div class="col-md-auto">
      <div class="title h4 mb-0"><font face="黑体"><a title="{{ site.title }}" href="/" class="text-decoration-none">{{ site.title }}</a></font></div>
    </div>
    
    <!-- 导航栏 -->
    <div class="col-md">
      <nav class="navbar navbar-expand-lg navbar-light bg-transparent p-0">
        <div class="container-fluid p-0">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-start" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/archive.html' }}" title="Archive"><span class='fa fa-archive'></span> <span class="d-md-none ms-1">Archive</span></a>
              </li>
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/categories.html' }}" title="Categories"><span class='fa fa-navicon'></span> <span class="d-md-none ms-1">Categories</span></a>
              </li>
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/tags.html' }}" title="Tags"><span class='fa fa-tags'></span> <span class="d-md-none ms-1">Tags</span></a>
              </li>
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/about.html' }}" title="About"><span class='fa fa-user'></span> <span class="d-md-none ms-1">About</span></a>
              </li>
              {% if site.author.github %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="https://github.com/{{ site.author.github }}" target="_blank" title="Github"><span class='fa fa-github'></span></a>
              </li>
              {% endif %}
              {% if site.author.weibo %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="http://weibo.com/{{ site.author.weibo }}" target="_blank" title="Weibo"><span class="fa fa-weibo"></span></a>
              </li>
              {% endif %}
              {% if site.author.stackoverflow %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ site.author.stackoverflow }}" target="_blank" title="Stackoverflow"><span class="fa fa-stack-overflow"></span></a>
              </li>
              {% endif %}
              {% if site.author.zhihu %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ site.author.zhihu }}" target="_blank" title="Zhihu"><span class="icon-stack fa-sm addin">
                    <i class="fa fa-circle fa-stack-2x"></i>
                    <i class="iconfont icon-zhihu fa-stack-1x fa-inverse"></i>
                </span></a>
              </li>
              {% endif %}
              <li class="nav-item mx-1">
                <a class="nav-link" href="{{ '/rss.xml' }}" target="_blank" title="RSS"><span class='fa fa-rss'></span></a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
    
    <!-- 搜索框和主题切换 -->
    <div class="col-md-auto d-flex align-items-center">
      <form id="search-form" class="d-flex me-2" role="search" style="width: 140px;">
        <input type="text" class="form-control form-control-sm" placeholder="Search" id="query" aria-label="Search">
      </form>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <i class="fa fa-moon-o"></i>
      </button>
    </div>
  </div>
</header>
